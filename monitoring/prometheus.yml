global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "telemetry-consumer"
    static_configs:
      - targets: ["consumer:2112"]
    metrics_path: /metrics

  - job_name: "telemetry-api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
