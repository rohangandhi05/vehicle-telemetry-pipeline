name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/vehicle-telemetry

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────────────────────
  test-producer:
    name: Test Producer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: producer/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: producer
          version: latest

      - name: Test
        working-directory: producer
        run: go test ./... -race -coverprofile=coverage.out
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: producer/coverage.out
          flags: producer

  test-consumer:
    name: Test Consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: consumer/go.sum
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: consumer
      - name: Test
        working-directory: consumer
        run: go test ./... -race -coverprofile=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: consumer/coverage.out
          flags: consumer

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: api/go.sum
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: api
      - name: Test
        working-directory: api
        run: go test ./... -race -coverprofile=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: api/coverage.out
          flags: api

  # ─── Integration Tests ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-producer, test-consumer, test-api]
    services:
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run integration tests
        run: go test ./... -tags=integration -timeout=120s
        env:
          KAFKA_BROKER: localhost:9092
          REDIS_ADDR: localhost:6379

  # ─── Build & Push Images ─────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [producer, consumer, api]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          SHA=$(echo ${{ github.sha }} | cut -c1-7)

          kubectl set image deployment/telemetry-producer \
            producer=${IMAGE_TAG}-producer:main-${SHA} -n telemetry

          kubectl set image deployment/telemetry-consumer \
            consumer=${IMAGE_TAG}-consumer:main-${SHA} -n telemetry

          kubectl set image deployment/telemetry-api \
            api=${IMAGE_TAG}-api:main-${SHA} -n telemetry

          kubectl rollout status deployment/telemetry-producer -n telemetry --timeout=120s
          kubectl rollout status deployment/telemetry-consumer -n telemetry --timeout=120s
          kubectl rollout status deployment/telemetry-api -n telemetry --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n telemetry
          kubectl get services -n telemetry
